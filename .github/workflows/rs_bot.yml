name: Run RS Pipeline Bot

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Kéo code từ kho về
      uses: actions/checkout@v4 # Đã nâng lên v4 để triệt tiêu cảnh báo vàng
      
    - name: Cài đặt Python
      uses: actions/setup-python@v5 # Đã nâng lên v5 
      with:
        python-version: '3.10'
        
    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Tạo file Chìa khóa từ Secret (BƯỚC QUAN TRỌNG NHẤT)
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: echo "$GOOGLE_CREDENTIALS" > credentials.json
        
    - name: Khởi động Bot Cào Data
      run: python rs_worker.py
